services:
  web:
    build: .
    working_dir: /app
    command: sh -c "sleep 10 && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - mongodb
      - rabbitmq

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6381:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"

  celery-worker:
    build: .
    working_dir: /app
    command: celery -A config worker -P solo -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis
      - db

  celery-beat:
    build: .
    working_dir: /app
    command: celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis
      - db

  flower:
    build: .
    working_dir: /app
    command: celery -A config flower --port=5555
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "5556:5555"
    depends_on:
      - celery-worker

volumes:
  postgres_data:
