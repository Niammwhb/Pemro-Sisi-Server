services:
  db:
    image: postgres:15
    container_name: lms_db
    restart: always
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lmsuser
      POSTGRES_PASSWORD: lmspass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: lms_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: lms
      DB_USER: lmsuser
      DB_PASSWORD: lmspass
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data: