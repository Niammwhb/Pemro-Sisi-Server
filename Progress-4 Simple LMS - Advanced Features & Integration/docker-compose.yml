version: "3.9"

services:
  # ============================================================
  # WEB - Django Application
  # ============================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn lms.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8080:8000"
    environment:
      DJANGO_SETTINGS_MODULE: lms.settings.base
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DEBUG: ${DEBUG:-True}
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      POSTGRES_HOST: db
      REDIS_HOST: redis
      MONGODB_HOST: mongodb
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-lms_user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-lms_password}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-lms_vhost}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lms_network
    restart: unless-stopped

  # ============================================================
  # POSTGRESQL
  # ============================================================
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - lms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # REDIS
  # ============================================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # MONGODB
  # ============================================================
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: lms_analytics
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ============================================================
  # RABBITMQ
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: lms_user
      RABBITMQ_DEFAULT_PASS: lms_password
      RABBITMQ_DEFAULT_VHOST: lms_vhost
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ============================================================
  # CELERY WORKER
  # ============================================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A lms.celery worker --loglevel=info
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: lms.settings.base
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      POSTGRES_HOST: db
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      REDIS_HOST: redis
      MONGODB_HOST: mongodb
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: lms_user
      RABBITMQ_PASS: lms_password
      RABBITMQ_VHOST: lms_vhost
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lms_network

  # ============================================================
  # CELERY BEAT
  # ============================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A lms.celery beat --loglevel=info
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: lms.settings.base
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      POSTGRES_HOST: db
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      REDIS_HOST: redis
      MONGODB_HOST: mongodb
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: lms_user
      RABBITMQ_PASS: lms_password
      RABBITMQ_VHOST: lms_vhost
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lms_network

  # ============================================================
  # FLOWER
  # ============================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A lms.celery flower --port=5555
    ports:
      - "5555:5555"
    environment:
      DJANGO_SETTINGS_MODULE: lms.settings.base
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: lms_user
      RABBITMQ_PASS: lms_password
      RABBITMQ_VHOST: lms_vhost
      REDIS_HOST: redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lms_network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  rabbitmq_data:
  media_data:
  static_data:

networks:
  lms_network:
    driver: bridge
